<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Audio Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background animations */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            z-index: 0;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            animation: float 6s ease-in-out infinite;
            filter: blur(40px);
        }

        .orb-1 { width: 200px; height: 200px; top: 10%; left: 10%; animation-delay: 0s; }
        .orb-2 { width: 150px; height: 150px; top: 60%; right: 20%; animation-delay: -2s; }
        .orb-3 { width: 100px; height: 100px; bottom: 20%; left: 60%; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            33% { transform: translateY(-20px) scale(1.1); }
            66% { transform: translateY(10px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            text-align: center;
        }

        .heading {
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        .ds {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .heading h1 {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            margin-top: 1rem;
            opacity: 0.9;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.8s ease-out 0.2s both;
            position: relative;
            overflow: hidden;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .track-info {
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .track-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .track-artist {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .progress-container {
            margin: 2rem 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .progress-bar:hover {
            transform: scaleY(1.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border-radius: 4px;
            width: 35%;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
            animation: fadeIn 0.8s ease-out 0.8s both;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            color: #ffffff;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .play-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
        }

        .play-btn:hover {
            background: linear-gradient(135deg, #ff5252, #26a69a);
            transform: translateY(-3px) scale(1.05);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            animation: fadeIn 0.8s ease-out 1s both;
        }

        .volume-slider {
            width: 120px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            appearance: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4ecdc4;
            border-radius: 50%;
            cursor: pointer;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin: 1.5rem 0;
            animation: fadeIn 0.8s ease-out 1.2s both;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #ff6b6b, #4ecdc4);
            border-radius: 2px;
            animation: visualize 0.8s ease-in-out infinite alternate;
        }

        .bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 15px; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 25px; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 30px; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 20px; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 35px; animation-delay: 0.7s; }

        @keyframes visualize {
            from { transform: scaleY(0.3); opacity: 0.7; }
            to { transform: scaleY(1); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .ds { font-size: 3rem; }
            .heading h1 { font-size: 1.2rem; }
            .player-container { padding: 2rem 1.5rem; }
            .controls { gap: 1rem; }
            .control-btn { width: 50px; height: 50px; }
            .play-btn { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>

    <div class="container">
        <div class="heading">
            <h1><span class="ds">DS</span><br> Audio Player<br>Play Music Feel Music in Style</h1>
        </div>

        <div class="player-container">
            <div class="track-info">
                <div class="track-title">Synthwave Dreams</div>
                <div class="track-artist">Digital Soundscape</div>
            </div>

            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span>2:14</span>
                    <span>6:22</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="previousTrack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                
                <button class="control-btn play-btn" onclick="togglePlay()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                
                <button class="control-btn" onclick="nextTrack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 18h2V6h-2zm-11-7l8.5 6V6z"/>
                    </svg>
                </button>
            </div>

            <div class="volume-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white" opacity="0.7">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <input type="range" class="volume-slider" min="0" max="100" value="70" onchange="setVolume(this.value)">
            </div>
        </div>
    </div>

    <script>
        let isPlaying = false;
        let currentProgress = 35;

        function togglePlay() {
            const playBtn = document.querySelector('.play-btn svg path');
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                playBtn.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // Pause icon
                startVisualization();
            } else {
                playBtn.setAttribute('d', 'M8 5v14l11-7z'); // Play icon
                stopVisualization();
            }
        }

        function nextTrack() {
            // Simulate track change
            const titles = ['Synthwave Dreams', 'Neon Nights', 'Digital Horizon', 'Cyber Rain'];
            const artists = ['Digital Soundscape', 'RetroWave', 'FutureBeat', 'Synthmaster'];
            
            const currentTitle = document.querySelector('.track-title');
            const currentArtist = document.querySelector('.track-artist');
            
            const randomIndex = Math.floor(Math.random() * titles.length);
            currentTitle.textContent = titles[randomIndex];
            currentArtist.textContent = artists[randomIndex];
            
            // Reset progress
            currentProgress = 0;
            updateProgress();
        }

        function previousTrack() {
            nextTrack(); // Same logic for demo
        }

        function seek(event) {
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width * 100;
            currentProgress = Math.max(0, Math.min(100, percent));
            updateProgress();
        }

        function updateProgress() {
            const progressFill = document.querySelector('.progress-fill');
            progressFill.style.width = currentProgress + '%';
            
            // Update time display
            const currentTime = Math.floor(currentProgress * 6.22 / 100);
            const minutes = Math.floor(currentTime / 60);
            const seconds = Math.floor(currentTime % 60);
            document.querySelector('.time-info span:first-child').textContent = 
                minutes + ':' + seconds.toString().padStart(2, '0');
        }

        function setVolume(value) {
            // Visual feedback only
            console.log('Volume set to:', value);
        }

        function startVisualization() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = 'running';
            });
        }

        function stopVisualization() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = 'paused';
            });
        }

        // Simulate progress when playing
        setInterval(() => {
            if (isPlaying && currentProgress < 100) {
                currentProgress += 0.1;
                updateProgress();
            }
        }, 100);

        // Initialize
        stopVisualization();
    </script>
</body>
</html>
